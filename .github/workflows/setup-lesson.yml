name: Setup Lesson

on:
  workflow_dispatch:
    inputs:
      lesson_name:
        description: "lesson name"
        required: true
        type: choice
        options:
          - "Basic-DriveTrain"
          - "GitHub-Basics"
      year:
        description: "Year (YYY format, e.g., 2025) or leave empty to use current year"
        required: false
        type: string

jobs:
  provision:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      year: ${{ steps.repo-name.outputs.year }}
      repository_short_name: ${{ steps.repo-name.outputs.repository_short_name }}
      repository_name: ${{ steps.repo-name.outputs.repository_name }}

    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Construct Repository Name
        id: repo-name
        run: |
          # Use current year if not provided
          YEAR="${{ inputs.year }}"
          if [ -z "$YEAR" ]; then
            YEAR=$(date +%Y)
            echo "No year provided, using current year: $YEAR"
          fi

          REPO_SHORT_NAME="${{ inputs.lesson_name }}-$YEAR"
          REPO_FULL_NAME="${{ github.repository_owner }}/$REPO_SHORT_NAME"
          echo "year=$YEAR" >> $GITHUB_OUTPUT
          echo "repository_short_name=$REPO_SHORT_NAME" >> $GITHUB_OUTPUT
          echo "repository_name=$REPO_FULL_NAME" >> $GITHUB_OUTPUT
          echo "Repository name: $REPO_FULL_NAME"

      - name: Create Repository
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          echo "Creating repository ${{ steps.repo-name.outputs.repository_name }}..."

          # Check if repository already exists
          if gh repo view ${{ steps.repo-name.outputs.repository_name }} &>/dev/null; then
            echo "✅ Repository already exists!"
          else
            # Create the repository with README to initialize main branch
            gh repo create ${{ steps.repo-name.outputs.repository_name }} \
              --public \
              --description "FRC ${{ steps.repo-name.outputs.year }} - ${{ inputs.lesson_name }}" \
              --clone=false

            echo "✅ Repository created successfully!"

            # Initialize the repository with an initial commit
            TEMP_DIR=$(mktemp -d)
            cd $TEMP_DIR
            git init -b main
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            echo "# ${{ steps.repo-name.outputs.repository_short_name }}" > README.md
            echo "" >> README.md
            echo "FRC ${{ steps.repo-name.outputs.year }} - ${{ inputs.lesson_name }} " >> README.md
            git add README.md
            git commit -m "chore: initial commit"
            git remote add origin "https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/${{ steps.repo-name.outputs.repository_name }}.git"
            git push -u origin main
            cd -
            rm -rf $TEMP_DIR

            echo "✅ Repository initialized with main branch!"
          fi

      - name: Apply Repository Settings
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          echo "Applying repository settings to ${{ steps.repo-name.outputs.repository_name }}..."

          # Update repository settings
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${{ steps.repo-name.outputs.repository_name }}" \
            -f has_issues=true \
            -f has_projects=false \
            -f has_wiki=false \
            -f has_discussions=false \
            -f allow_squash_merge=true \
            -f allow_merge_commit=false \
            -f allow_rebase_merge=true \
            -f allow_auto_merge=true \
            -f delete_branch_on_merge=true \
            -f allow_update_branch=true \
            -f squash_merge_commit_title="PR_TITLE" \
            -f squash_merge_commit_message="PR_BODY" \
            -f web_commit_signoff_required=false \
            -f is_template=true

          echo "✅ Repository settings applied successfully!"

  setup-basic-drivetrain:
    needs: provision
    if: inputs.lesson_name == 'Basic-DriveTrain'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout management repository
        uses: actions/checkout@v4
        with:
          path: management

      - name: Clone target repository
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          git clone "https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/${{ needs.provision.outputs.repository_name }}.git" target-repo
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Devcontainer Configuration
        run: |
          cd target-repo
          echo "Setting up devcontainer configuration for ${{ needs.provision.outputs.repository_name }}..."

          # Create .devcontainer directory if it doesn't exist
          mkdir -p .devcontainer

          # Copy devcontainer from templates directory
          cp -r ../management/${{inputs.lesson_name}}/.devcontainer .

          # Add devcontainer.json to git
          git add .devcontainer

          if git diff --staged --quiet; then
            echo "✅ Devcontainer configuration already exists and is up to date!"
          else
            git commit -m "chore: add devcontainer configuration"
            git push
            echo "✅ Devcontainer configuration created and committed!"
          fi

      - name: Setup Git Hooks
        run: |
          cd target-repo
          echo "Setting up git hooks for ${{ needs.provision.outputs.repository_name }}..."

          # Copy git hooks from templates directory
          cp -r ../management/${{inputs.lesson_name}}/.githooks .githooks

          # Make hooks executable
          chmod +x .githooks/pre-push

          # Remove README from hooks directory (not needed in deployed repos)
          rm -f .githooks/README.md

          # Commit and push if there are changes
          git add .githooks/

          if git diff --staged --quiet; then
            echo "✅ Git hooks already exist and are up to date!"
          else
            git commit -m "chore: add git hooks"
            git push
            echo "✅ Git hooks created and committed!"
          fi

      - name: Setup CI Workflow
        run: |
          cd target-repo
          echo "Setting up CI workflow for ${{ needs.provision.outputs.repository_name }}..."

          # Copy .github folder from templates
          cp -r ../management/${{inputs.lesson_name}}/.github/ .github

          # Commit and push if there are changes
          git add .github

          if git diff --staged --quiet; then
            echo "✅ CI workflow already exists and is up to date!"
          else
            git commit -m "ci: add build workflow"
            git push
            echo "✅ CI workflow created and committed!"
          fi

      - name: Setup WPILib Project Files
        run: |
          cd target-repo
          echo "Setting up WPILib project files for ${{ needs.provision.outputs.repository_name }}..."

          # Copy .vscode settings
          mkdir -p .vscode
          cp -r ../management/${{inputs.lesson_name}}/.vscode/* .vscode/

          # Copy .wpilib preferences and update with team number and year
          mkdir -p .wpilib
          cp ../management/${{inputs.lesson_name}}/.wpilib/wpilib_preferences.json .wpilib/

          # Update project year in wpilib_preferences.json
          sed -i 's/"projectYear": "[^"]*"/"projectYear": "${{ needs.provision.outputs.year }}"/' .wpilib/wpilib_preferences.json

          # Copy Gradle wrapper and build files
          mkdir -p gradle/wrapper
          cp ../management/${{inputs.lesson_name}}/gradle/wrapper/* gradle/wrapper/
          cp ../management/${{inputs.lesson_name}}/gradlew .
          cp ../management/${{inputs.lesson_name}}/gradlew.bat .
          chmod +x gradlew

          # Copy build configuration files
          cp ../management/${{inputs.lesson_name}}/build.gradle .
          cp ../management/${{inputs.lesson_name}}/settings.gradle .

          # Copy .gitignore
          cp ../management/${{inputs.lesson_name}}/.gitignore .

          # Copy WPILib license
          cp ../management/${{inputs.lesson_name}}/WPILib-License.md .
          # Copy Lesson files
          cp ../management/${{inputs.lesson_name}}/*.md .

          # Copy source code structure
          mkdir -p src
          mkdir -p src/main/java/frc/robot/{commands,subsystems}
          mkdir -p src/main/deploy
          cp -r ../management/${{inputs.lesson_name}}/src/* src/

          # Copy vendordeps directory
          mkdir -p vendordeps
          cp ../management/${{inputs.lesson_name}}/vendordeps/* vendordeps/

          # Commit and push if there are changes
          git add .vscode/ .wpilib/ gradle/ gradlew gradlew.bat build.gradle settings.gradle .gitignore WPILib-License.md src/ vendordeps/

          if git diff --staged --quiet; then
            echo "✅ WPILib project files already exist and are up to date!"
          else
            git commit -m "chore: add WPILib project structure"
            git push
            echo "✅ WPILib project files created and committed!"
          fi

      - name: Summary
        run: |
          echo "## Repository Setup Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Target Repository:" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Repository: ${{ needs.provision.outputs.repository_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lesson Name: ${{ inputs.lesson_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 Year: ${{ needs.provision.outputs.year }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Applied Settings:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Repository Settings" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Pull Request Template" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Devcontainer Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Git Hooks (pre-commit, commit-msg)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CI Workflow (build.yml)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ WPILib Project Structure (Gradle, VS Code, build files)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recommended Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ **Enable Codespaces Prebuilds** (reduces startup from 5-10min to ~1min):" >> $GITHUB_STEP_SUMMARY
          echo "  - Go to [${{ needs.provision.outputs.repository_name }}](https://github.com/${{ needs.provision.outputs.repository_name }}/settings/codespaces) Settings → Codespaces" >> $GITHUB_STEP_SUMMARY
          echo "  - Click 'Set up prebuild' → Select main branch and .devcontainer" >> $GITHUB_STEP_SUMMARY

  setup-github-basics:
    needs: provision
    if: inputs.lesson_name == 'GitHub-Basics'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout management repository
        uses: actions/checkout@v4
        with:
          path: management

      - name: Clone target repository
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          git clone "https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/${{ needs.provision.outputs.repository_name }}.git" target-repo
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Devcontainer Configuration
        run: |
          cd target-repo
          echo "Setting up devcontainer configuration for ${{ needs.provision.outputs.repository_name }}..."

          mkdir -p .devcontainer
          cp -r ../management/${{ inputs.lesson_name }}/.devcontainer .

          git add .devcontainer

          if git diff --staged --quiet; then
            echo "✅ Devcontainer configuration already exists and is up to date!"
          else
            git commit -m "chore: add devcontainer configuration"
            git push
            echo "✅ Devcontainer configuration created and committed!"
          fi

      - name: Setup Git Hooks
        run: |
          cd target-repo
          echo "Setting up git hooks for ${{ needs.provision.outputs.repository_name }}..."

          cp -r ../management/${{ inputs.lesson_name }}/.githooks .githooks
          chmod +x .githooks/commit-msg

          git add .githooks/

          if git diff --staged --quiet; then
            echo "✅ Git hooks already exist and are up to date!"
          else
            git commit -m "chore: add git hooks"
            git push
            echo "✅ Git hooks created and committed!"
          fi

      - name: Setup Lesson Files
        run: |
          cd target-repo
          echo "Setting up lesson files for ${{ needs.provision.outputs.repository_name }}..."

          cp ../management/${{ inputs.lesson_name }}/.gitignore .
          cp ../management/${{ inputs.lesson_name }}/wpilib.gitignore .
          cp ../management/${{ inputs.lesson_name }}/README.md .
          cp ../management/${{ inputs.lesson_name }}/student-notes.md .

          mkdir -p grading
          cp ../management/${{ inputs.lesson_name }}/grading/* grading/
          chmod +x grading/*.sh

          git add .gitignore wpilib.gitignore README.md student-notes.md grading/

          if git diff --staged --quiet; then
            echo "✅ Lesson files already exist and are up to date!"
          else
            git commit -m "chore: add lesson files"
            git push
            echo "✅ Lesson files created and committed!"
          fi

      - name: Summary
        run: |
          echo "## Repository Setup Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Target Repository:" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Repository: ${{ needs.provision.outputs.repository_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lesson Name: ${{ inputs.lesson_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 Year: ${{ needs.provision.outputs.year }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Applied Settings:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Repository Settings" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Devcontainer Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Git Hooks (commit-msg)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Lesson Files (README, student-notes, grading scripts)" >> $GITHUB_STEP_SUMMARY
